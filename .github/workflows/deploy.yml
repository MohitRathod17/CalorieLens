name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/calorie-track:latest .

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/calorie-track:latest

      - name: SSH and redeploy on EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/calorie-track:latest
            docker stop calorie-track || true
            docker rm calorie-track || true
            docker run -d \
              --name calorie-track \
              --restart always \
              -p 80:5000 \
              --env-file ~/calorie-track.env \
              ${{ secrets.DOCKER_USERNAME }}/calorie-track:latest
