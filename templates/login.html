<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Login | CalorieLens</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700;800;900&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:        #0a0a0a;
            --surface:   #111111;
            --surface2:  #181818;
            --border:    rgba(255,255,255,0.07);
            --accent:    #e8702a;
            --accent-dim:#b35520;
            --accent-glow: rgba(232,112,42,0.18);
            --text:      #f0f0f0;
            --muted:     #6b6b6b;
            --muted2:    #3a3a3a;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'Barlow',sans-serif;
            background:var(--bg);
            color:var(--text);
            min-height:100vh;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            padding:20px;
        }
        .brand {
            font-family:'Barlow Condensed',sans-serif;
            font-size:1.1rem;
            font-weight:700;
            letter-spacing:0.25em;
            text-transform:uppercase;
            color:var(--muted);
            margin-bottom:40px;
        }
        .brand span { color:var(--accent); }
        .card {
            background:var(--surface);
            border:1px solid var(--border);
            border-radius:16px;
            padding:36px 32px;
            width:100%;
            max-width:400px;
        }
        .card-title {
            font-family:'Barlow Condensed',sans-serif;
            font-size:2.2rem;
            font-weight:800;
            letter-spacing:0.02em;
            text-transform:uppercase;
            color:var(--text);
            margin-bottom:6px;
        }
        .card-sub {
            color:var(--muted);
            font-size:0.875rem;
            margin-bottom:28px;
        }
        .form-group {
            display:flex;
            flex-direction:column;
            gap:6px;
            margin-bottom:18px;
        }
        label {
            font-size:0.75rem;
            font-weight:600;
            letter-spacing:0.12em;
            text-transform:uppercase;
            color:var(--muted);
        }
        input {
            width:100%;
            padding:13px 16px;
            background:var(--surface2);
            border:1px solid var(--border);
            border-radius:10px;
            color:var(--text);
            font-family:inherit;
            font-size:0.95rem;
            transition:border-color 0.2s, box-shadow 0.2s;
        }
        input:focus {
            outline:none;
            border-color:var(--accent);
            box-shadow:0 0 0 3px var(--accent-glow);
        }
        .error-msg {
            background:rgba(220,60,60,0.12);
            border:1px solid rgba(220,60,60,0.25);
            color:#f87171;
            padding:12px 14px;
            border-radius:8px;
            font-size:0.85rem;
            margin-bottom:18px;
        }
        .btn {
            width:100%;
            padding:14px;
            border:none;
            border-radius:10px;
            font-family:inherit;
            font-weight:700;
            font-size:0.95rem;
            letter-spacing:0.06em;
            text-transform:uppercase;
            color:#fff;
            cursor:pointer;
            background:var(--accent);
            transition:background 0.2s, transform 0.15s;
            margin-top:6px;
        }
        .btn:hover { background:var(--accent-dim); transform:translateY(-1px); }
        .auth-footer {
            margin-top:22px;
            font-size:0.85rem;
            color:var(--muted);
            text-align:center;
        }
        .auth-footer a {
            color:var(--accent);
            text-decoration:none;
            font-weight:600;
        }
    </style>
</head>
<body>
    <div class="brand">Calorie<span>Lens</span></div>
    <div class="card">
        <div class="card-title">Sign In</div>
        <div class="card-sub">Track your nutrition and reach your physique goals</div>
        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}
        <form action="/login" method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required placeholder="Enter your username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter your password">
            </div>
            <button class="btn" type="submit">Sign In</button>
        </form>
        <div class="auth-footer">
            No account? <a href="/signup">Create one</a>
        </div>
    </div>
</body>
</html>
